version: "3.8"
name: base

services:
    proxy:
        container_name: almx-nginx-proxy-server
        image: nginx:latest
        restart: unless-stopped
        environment:
            SERVER_DOMAIN: alemax.dev.br
            SERVER_LOCAL_IP: 192.168.0.144
        ports:
            - 80:80
            - 443:443
        volumes:
            - ./src/nginx/templates:/etc/nginx/templates
            - ./src/nginx/log.conf:/etc/nginx/log.conf
            - ./src/nginx/nginx.conf:/etc/nginx/nginx.conf
    portainer:
        container_name: almx-portainer
        image: portainer/portainer-ce:latest
        ports:
            - 9443:9443
        volumes:
            - /media/archive/portainer:/data
            - /var/run/docker.sock:/var/run/docker.sock
        restart: unless-stopped
    gitea:
        image: docker.io/gitea/gitea:1.23.1
        container_name: almx-gitea
        environment:
            - USER_UID=1000
            - USER_GID=1000
            - GITEA__database__DB_TYPE=postgres
            - GITEA__database__HOST=giteadb:5432
            - GITEA__database__NAME=gitea
            - GITEA__database__USER=gitea
            - GITEA__database__PASSWD=gitea
        restart: always
        volumes:
            - /media/archive/gitea:/data
            - ./src/gitea/app.ini:/data/conf/app.ini
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        ports:
            - 3040:3000
            - 222:22
        depends_on:
            - giteadb
    syncthing:
      image: syncthing/syncthing
      container_name: almx-syncthing
      environment:
        - PUID=1000
        - PGID=1000
      volumes:
        - /media/archive/syncthing:/var/syncthing
      ports:
        - 8384:8384 # Web UI
        - 22000:22000/tcp # TCP file transfers
        - 22000:22000/udp # QUIC file transfers
        - 21027:21027/udp # Receive local discovery broadcasts
      restart: unless-stopped
      healthcheck:
        test: curl -fkLsS -m 2 127.0.0.1:8384/rest/noauth/health | grep -o --color=never OK || exit 1
        interval: 1m
        timeout: 10s
        retries: 3
    gitearunner:
      image: gitea/act_runner
      container_name: almx-gitea-runner
      restart: always
      depends_on:
        - gitea
      volumes:
        - /media/archive/gitea-runner:/data
        - /var/run/docker.sock:/var/run/docker.sock
      environment:
        - GITEA_INSTANCE_URL=https://gitea.alemax.dev.br
        - GITEA_RUNNER_REGISTRATION_TOKEN=TAN1mHZeWyAhkvtpHQRlMs7Sn9523RNq57YQUx84
    giteadb:
        image: docker.io/library/postgres:14
        container_name: almx-gitea-db
        restart: always
        environment:
            - POSTGRES_USER=gitea
            - POSTGRES_PASSWORD=gitea
            - POSTGRES_DB=gitea
        volumes:
            - /media/archive/gitea-db:/var/lib/postgresql/data
