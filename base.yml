version: "3.8"
name: base

services:
    proxy:
        container_name: almx-nginx-proxy-server
        image: nginx:latest
        restart: unless-stopped
        environment:
            SERVER_DOMAIN: alemax.dev.br
            SERVER_LOCAL_IP: 192.168.0.144
        ports:
            - 80:80
            - 443:443
        volumes:
            - ./src/nginx/templates:/etc/nginx/templates
            - ./src/nginx/log.conf:/etc/nginx/log.conf
            - ./src/nginx/nginx.conf:/etc/nginx/nginx.conf
    portainer:
        container_name: almx-portainer
        image: portainer/portainer-ce:latest
        ports:
            - 9443:9443
        volumes:
            - /media/archive/portainer:/data
            - /var/run/docker.sock:/var/run/docker.sock
        restart: unless-stopped
    gitea:
        image: docker.io/gitea/gitea:1.23.1
        container_name: almx-gitea
        environment:
            - USER_UID=1000
            - USER_GID=1000
            - GITEA__database__DB_TYPE=postgres
            - GITEA__database__HOST=giteadb:5432
            - GITEA__database__NAME=gitea
            - GITEA__database__USER=gitea
            - GITEA__database__PASSWD=gitea
        restart: always
        volumes:
            - /media/archive/gitea:/data
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        ports:
            - 3040:3000
            - 222:22
        depends_on:
            - giteadb
    giteadb:
        image: docker.io/library/postgres:14
        container_name: almx-gitea-db
        restart: always
        environment:
            - POSTGRES_USER=gitea
            - POSTGRES_PASSWORD=gitea
            - POSTGRES_DB=gitea
        volumes:
            - /media/archive/gitea-db:/var/lib/postgresql/data
