version: "3.8"
name: apps

services:
    jellyfin:
        image: lscr.io/linuxserver/jellyfin:latest
        container_name: almx-jellyfin
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Etc/UTC
        volumes:
            - /media/archive/jellyfin/library:/config
            - /media/archive/jellyfin/tvseries:/data/tvshows
            - /media/archive/jellyfin/movies:/data/movies
            - /media/archive/jellyfin/music:/data/music
        ports:
            - 8096:8096
            - 8920:8920
            - 7359:7359/udp
            - 1900:1900/udp
        restart: unless-stopped
    scrobbler:
        image: foxxmd/multi-scrobbler
        container_name: almx-scrobbler
        environment:
            - TZ=America/Fortaleza
            #- SPOTIFY_CLIENT_ID=
            #- SPOTIFY_CLIENT_SECRET=
            #- SPOTIFY_REDIRECT_URI=http://multi-scrobbler-host-IP:9078/callback ## Need to be whitelisted in Spotify dashboard and is used for creating the connection first time
            - MALOJA_URL=https://maloja.alemax.dev.br
            - MALOJA_API_KEY=FiddtQJIBHgh4541DMCqmnkttcljIoZX1UWSO7rfc5UXKG5Uy1DrpZP9n7TM8MNI
            - PUID=1000
            - PGID=1000
            - BASE_URL=https://scrobbler.alemax.dev.br
        volumes:
            - /media/archive/scrobbler/config:/config
            - ./src/scrobbler/config/config.json:/config/config.json
        ports:
            - 9078:9078
        restart: unless-stopped
    maloja:
        image: krateng/maloja
        container_name: almx-maloja
        environment:
            MALOJA_SKIP_SETUP: true
            MALOJA_DATA_DIRECTORY: /mljdata
            PUID: 1000
            PGID: 1000
        volumes:
            - /media/archive/mljdata:/mljdata
        ports:
            - 42010:42010
        restart: unless-stopped
    filebrowser:
        container_name: almx-filebrowser
        image: hurlenko/filebrowser
        user: "1000:1000"
        ports:
            - 4430:8080
        volumes:
            - /media/archive:/data
            - /media/archive/filebrowser:/config
        environment:
            - FB_BASEURL=/filebrowser
        restart: always
    qbittorrent:
        container_name: almx-qbittorrent
        image: linuxserver/qbittorrent:latest
        restart: unless-stopped
        env_file: ./outline.env
        environment:
            - TZ=America/Sao_Paulo
        ports:
            - 8090:8080
            - 6881:6881/tcp
            - 6881:6881/udp
        volumes:
            - /media/archive/torrents/config:/config
            - /media/archive/torrents/data:/data
            - /media/archive/downloads:/downloads:rw
            - /media/archive/torrents/incomplete:/incomplete
    outline:
        image: docker.getoutline.com/outlinewiki/outline:latest
        container_name: almx-outline
        ports:
            - "4343:3000"
        volumes:
            - /media/archive/outline-data:/var/lib/outline/data
        depends_on:
            - postgres
            - outlineredis
    outlineredis:
        image: redis
        env_file: ./outline.env
        container_name: almx-outline-redis
        ports:
            - "6379:6379"
        volumes:
            - ./redis.conf:/redis.conf
        command: ["redis-server", "/redis.conf"]
        healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 30s
        retries: 3
   outlinepostgres:
        image: postgres
        container_name: almx-outline-postgres
        ports:
            - "5432:5432"
        volumes:
            - /media/archive/outline-database-data:/var/lib/postgresql/data
        healthcheck:
        test: ["CMD", "pg_isready", "-d", "outline", "-U", "user"]
        interval: 30s
        timeout: 20s
        retries: 3
        environment:
            POSTGRES_USER: 'user'
            POSTGRES_PASSWORD: 'pass'
            POSTGRES_DB: 'outline'