name: base

services:
    jellyfin:
        image: lscr.io/linuxserver/jellyfin:latest
        container_name: ${PREFIX}-jeillyfin
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Etc/UTC
        volumes:
            - ${STORAGE}/jellyfin/library:/config
            - ${STORAGE}/jellyfin/tvseries:/data/tvshows
            - ${STORAGE}/jellyfin/movies:/data/movies
            - ${STORAGE}/jellyfin/music:/data/music
        ports:
            - 8096:8096
            - 8920:8920
            - 7359:7359/udp
            - 1900:1900/udp
        restart: unless-stopped
